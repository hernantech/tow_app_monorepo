<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd740;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffab00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

  <!-- Tow boom / crane arm -->
  <line x1="95" y1="120" x2="140" y2="60" stroke="url(#hookGrad)" stroke-width="6" stroke-linecap="round" />
  <line x1="140" y1="60" x2="155" y2="60" stroke="url(#hookGrad)" stroke-width="5" stroke-linecap="round" />

  <!-- Hook -->
  <path d="M155,60 L155,72 Q155,82 148,82 Q141,82 141,75" fill="none" stroke="url(#hookGrad)" stroke-width="4.5" stroke-linecap="round" />

  <!-- Cable line -->
  <line x1="148" y1="82" x2="148" y2="95" stroke="#ffd740" stroke-width="2" stroke-dasharray="4,3" opacity="0.8" />

  <!-- Truck cab -->
  <rect x="38" y="105" width="50" height="30" rx="5" fill="url(#truckGrad)" />
  <!-- Cab roof curve -->
  <path d="M43,105 L43,95 Q43,88 50,88 L70,88 Q78,88 82,95 L88,105" fill="url(#truckGrad)" />
  <!-- Windshield -->
  <path d="M48,104 L50,94 Q50,92 52,92 L68,92 Q72,92 74,96 L78,104" fill="#1a73e8" opacity="0.6" />

  <!-- Truck flatbed -->
  <rect x="88" y="112" width="60" height="23" rx="3" fill="url(#truckGrad)" />
  <!-- Flatbed detail lines -->
  <line x1="98" y1="117" x2="98" y2="131" stroke="#bdbdbd" stroke-width="1" />
  <line x1="108" y1="117" x2="108" y2="131" stroke="#bdbdbd" stroke-width="1" />
  <line x1="118" y1="117" x2="118" y2="131" stroke="#bdbdbd" stroke-width="1" />
  <line x1="128" y1="117" x2="128" y2="131" stroke="#bdbdbd" stroke-width="1" />
  <line x1="138" y1="117" x2="138" y2="131" stroke="#bdbdbd" stroke-width="1" />

  <!-- Bumper -->
  <rect x="34" y="132" width="118" height="5" rx="2.5" fill="#e0e0e0" />

  <!-- Front wheel -->
  <circle cx="58" cy="140" r="12" fill="#37474f" />
  <circle cx="58" cy="140" r="8" fill="#263238" />
  <circle cx="58" cy="140" r="3.5" fill="#546e7a" />

  <!-- Rear wheel -->
  <circle cx="128" cy="140" r="12" fill="#37474f" />
  <circle cx="128" cy="140" r="8" fill="#263238" />
  <circle cx="128" cy="140" r="3.5" fill="#546e7a" />

  <!-- Headlight -->
  <rect x="36" y="115" width="5" height="8" rx="2" fill="#ffd740" opacity="0.9" />

  <!-- Light bar on top -->
  <rect x="50" y="84" width="8" height="5" rx="2" fill="#ff5252" opacity="0.9" />
  <rect x="62" y="84" width="8" height="5" rx="2" fill="#448aff" opacity="0.9" />

  <!-- Text -->
  <text x="100" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="3">QUICKTOW</text>
</svg>
